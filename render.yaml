# Render backend service config.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kiit-tt-api
    runtime: python
    plan: free
    # The repo root contains app.py, build_db.py, the Excel, and requirements.txt.
    buildCommand: pip install -r requirements.txt && python build_db.py timetable_reports_2_20260712_2108_student.xlsx
    # Run the API with gunicorn (DB already built during buildCommand).
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
    healthCheckPath: /api/health
    autoDeploy: true
