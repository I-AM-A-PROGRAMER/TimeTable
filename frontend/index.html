<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KIIT Timetable</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0b14" />
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KIIT Schedule" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <h1 class="app-name">KIIT<span>·</span>Schedule</h1>
        <div class="clock" id="clock">--:--</div>
      </div>

      <!-- Selectors -->
      <div class="selector-group">
        <div class="selector-row">
          <div class="select-wrap">
            <select id="dept-select" aria-label="Department"></select>
          </div>
          <div class="select-wrap">
            <select id="section-select" aria-label="Section" disabled></select>
          </div>
        </div>

        <div class="selector-row">
          <div class="select-wrap">
            <select id="pe1-select" aria-label="Professional Elective 1"></select>
          </div>
          <div class="select-wrap">
            <select id="pe1-section-select" aria-label="PE1 Section" disabled></select>
          </div>
        </div>

        <div class="selector-row">
          <div class="select-wrap">
            <select id="pe2-select" aria-label="Professional Elective 2"></select>
          </div>
          <div class="select-wrap">
            <select id="pe2-section-select" aria-label="PE2 Section" disabled></select>
          </div>
        </div>
      </div>
    </header>

    <!-- Day strip: current week with real dates, today auto-selected -->
    <nav class="day-strip" id="day-strip" aria-label="Select day"></nav>

    <!-- Live status banner -->
    <div class="status" id="status" hidden></div>

    <!-- Schedule -->
    <main class="schedule">
      <div class="schedule-head">
        <h2 id="day-title">—</h2>
        <span class="date-pill" id="date-pill"></span>
      </div>
      <div id="schedule-list" class="schedule-list">
        <div class="empty">
          <div class="empty-emoji">📅</div>
          <p>Pick your department and section to see your timetable.</p>
        </div>
      </div>
    </main>

    <footer class="foot">
      <span id="course-count"></span>
      <span class="copyright">© 2026 SUPRIYO PRAMANIK</span>
    </footer>

    <!-- PWA Install Banner -->
    <div id="install-banner" class="install-banner" hidden>
      <div class="install-content">
        <div class="install-icon">📲</div>
        <div class="install-text">
          <h3>Install App</h3>
          <p>Add KIIT Schedule to your home screen for quick, offline access.</p>
        </div>
      </div>
      <div class="install-actions">
        <button id="btn-install-dismiss" class="btn-dismiss">Later</button>
        <button id="btn-install-now" class="btn-install">Install</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
